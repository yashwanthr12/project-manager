<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Management Tool</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="app-header">
    <h1>Project Manager</h1>

    <!-- 🔍 Search + Filter -->
    <div class="header-search">
      <input
        type="text"
        id="taskSearchInput"
        placeholder="Search tasks..."
      />

      <select id="priorityFilter">
        <option value="all">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>

    <!-- Actions -->
    <div class="header-actions">
      <button id="addProjectBtn" class="btn btn-project">+ Project</button>
      <button id="addTaskBtn" class="btn btn-task">+ Task</button>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="app-container">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <h2>Projects</h2>

      <ul class="project-list">
        <!-- Projects rendered by JS -->
      </ul>
    </aside>

    <!-- ===== KANBAN BOARD ===== -->
    <section class="board">

      <div class="column" data-status="todo">
        <h3>To Do</h3>
        <div class="task-list"></div>
      </div>

      <div class="column" data-status="inprogress">
        <h3>In Progress</h3>
        <div class="task-list"></div>
      </div>

      <div class="column" data-status="done">
        <h3>Done</h3>
        <div class="task-list"></div>
      </div>

    </section>
  </main>

  <!-- ================= PROJECT MODAL ================= -->
  <div class="modal-overlay hidden" id="projectModal">
    <div class="modal">
      <h2>Add New Project</h2>

      <form id="projectForm">
        <input
          type="text"
          id="projectNameInput"
          placeholder="Project name"
          required
        />

        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="cancelProjectBtn">
            Cancel
          </button>
          <button type="submit" class="btn btn-project">
            Add Project
          </button>
        </div>
      </form>
    </div>
  </div>
<!-- ================= TASK MODAL ================= -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <h2>Add Task</h2>

    <form id="taskForm">
      <input
        type="text"
        id="taskTitleInput"
        placeholder="Task title"
        required
      />

      <textarea
        id="taskDescInput"
        placeholder="Task description"
        rows="3"
      ></textarea>

      <select id="taskPriorityInput">
        <option value="low">Low Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="high">High Priority</option>
      </select>

      <input type="date" id="taskDueDateInput" />

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelTaskBtn">
          Cancel
        </button>
        <button type="submit" class="btn btn-task">
          Add Task
        </button>
      </div>
    </form>
  </div>
</div>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
